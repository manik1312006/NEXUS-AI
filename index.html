<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXUS AI</title>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBYqYSWd1-DOB5O6gkixbRibtuJI66QkjE",
      authDomain: "storage-53912.firebaseapp.com",
      databaseURL: "https://storage-53912-default-rtdb.firebaseio.com",
      projectId: "storage-53912",
      storageBucket: "storage-53912.firebasestorage.app",
      messagingSenderId: "64798263730",
      appId: "1:64798263730:web:d373c0c43bdca9fd6c7cab",
      measurementId: "G-09HRHTNHQQ"

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Google Login
    window.signInWithGoogle = async () => {
      try {
        showLoader("Connecting...");
        const res = await signInWithPopup(auth, provider);
        await saveUser(res.user);
        location.href = "pages/chat.html";
      } catch (e) {
        hideLoader();
        showError(e.message);
      }
    };

    // Email Signup
    window.signUpWithEmail = async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) return showError("Enter email & password");

      try {
        showLoader("Creating account...");
        const res = await createUserWithEmailAndPassword(auth, email, password);
        await saveUser(res.user);
        location.href = "pages/chat.html";
      } catch (e) {
        hideLoader();
        showError(e.message);
      }
    };

    // Email Login
    window.loginWithEmail = async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) return showError("Enter email & password");

      try {
        showLoader("Logging in...");
        const res = await signInWithEmailAndPassword(auth, email, password);
        await saveUser(res.user);
        location.href = "pages/chat.html";
      } catch (e) {
        hideLoader();
        showError(e.message);
      }
    };

    async function saveUser(user) {
      await set(ref(db, "users/" + user.uid), {
        email: user.email || "",
        uid: user.uid,
        created: Date.now()
      });
    }

    onAuthStateChanged(auth, (user) => {
      if (user) location.href = "pages/chat.html";
    });
  </script>

  <style>
    body { background:#0b0b1a; color:#fff; font-family:sans-serif; text-align:center; padding:40px;}
    .card { max-width:400px; margin:auto; padding:30px; border-radius:12px; background:#14143a;}
    input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;}
    button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; cursor:pointer;}
    .primary { background:#7c3aed; color:#fff;}
    .secondary { background:#222; color:#aaa;}
    .tabs button.active { background:#7c3aed; color:#fff;}
    .panel { display:none;}
    .panel.active { display:block;}
    #loader { display:none;}
  </style>
</head>

<body>

<div id="loader">Loading...</div>

<div class="card">
  <h2>NEXUS AI</h2>

  <div class="tabs">
    <button id="tabBtn1" class="active" onclick="switchTab('google')">Google</button>
    <button id="tabBtn2" onclick="switchTab('email')">Email</button>
  </div>

  <!-- Google -->
  <div id="googlePanel" class="panel active">
    <button class="primary" onclick="signInWithGoogle()">Continue with Google</button>
  </div>

  <!-- Email -->
  <div id="emailPanel" class="panel">
    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Password">
    <button class="primary" onclick="loginWithEmail()">Login</button>
    <button class="secondary" onclick="signUpWithEmail()">Create Account</button>
  </div>

  <!-- STATUS -->
  <div id="statusMsg"></div>
</div>

<script>
function switchTab(tab){
  tabBtn1.classList.toggle("active", tab==="google");
  tabBtn2.classList.toggle("active", tab==="email");

  googlePanel.classList.toggle("active", tab==="google");
  emailPanel.classList.toggle("active", tab==="email");
}

function showLoader(msg){
  loader.style.display="block";
  loader.innerText=msg;
}
function hideLoader(){ loader.style.display="none"; }

function showError(msg){
  statusMsg.innerText="❌ "+msg;
  statusMsg.style.color="red";
}
</script>

</body>
</html>
